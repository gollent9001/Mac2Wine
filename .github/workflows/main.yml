name: Genera EXE da JAR esistente
on: [push]

jobs:
  packaging:
    runs-on: windows-latest
    steps:
      - name: Scarica il tuo codice
        uses: actions/checkout@v4

      - name: Crea l'EXE
        run: |
          ./launch4j/launch4jc.exe config.xml

      - name: Salva l'eseguibile creato
        uses: actions/upload-artifact@v4
        with:
          name: Programma-Windows
          path: pocketTime.exe
